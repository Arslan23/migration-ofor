<header class="bg-card border-b border-border px-3 sm:px-4 lg:px-6 py-3 lg:py-4">
    <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 min-w-0 flex-1">
            <!-- Mobile menu button -->
            <button class="lg:hidden flex-shrink-0 p-2 rounded-md hover:bg-accent text-muted-foreground"
                (click)="menuClick.emit()">
                <lucide-icon [img]="icons.Menu" class="w-5 h-5"></lucide-icon>
            </button>

            <div class="min-w-0">
                <h1 class="font-heading text-lg sm:text-xl lg:text-2xl font-bold text-foreground truncate">{{ title }}
                </h1>
                <p *ngIf="subtitle" class="text-xs sm:text-sm text-muted-foreground mt-0.5 truncate hidden sm:block">{{
                    subtitle }}</p>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-4 flex-shrink-0">
            <!-- Search (Visual only for now) -->
            <div class="relative hidden lg:block">
                <lucide-icon [img]="icons.Search"
                    class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground"></lucide-icon>
                <input type="search" placeholder="Rechercher..."
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 pl-10 w-48 xl:w-64" />
            </div>

            <!-- Notifications (Visual only for now) -->
            <button
                class="relative inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 hover:bg-accent hover:text-accent-foreground h-10 w-10">
                <lucide-icon [img]="icons.Bell" class="w-5 h-5"></lucide-icon>
                <span
                    class="absolute -top-1 -right-1 w-4 h-4 bg-secondary text-secondary-foreground text-xs rounded-full flex items-center justify-center font-semibold">
                    3
                </span>
            </button>

            <!-- User Menu Placeholder -->
            <div
                class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">
                AD
            </div>
        </div>
    </div>
</header>
