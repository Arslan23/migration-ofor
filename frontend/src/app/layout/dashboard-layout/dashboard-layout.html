<div class="flex h-screen bg-background overflow-hidden">
    <!-- Sidebar for Desktop -->
    <app-sidebar class="hidden lg:flex w-64 flex-col fixed inset-y-0 z-50"></app-sidebar>

    <!-- Mobile Sidebar Overlay -->
    <div *ngIf="sidebarOpen"
        class="fixed inset-0 z-40 lg:hidden bg-background/80 backdrop-blur-sm transition-all duration-100 data-[state=closed]:animate-out data-[state=closed]:fade-out data-[state=open]:fade-in"
        (click)="toggleSidebar()">
    </div>

    <!-- Mobile Sidebar -->
    <app-sidebar *ngIf="sidebarOpen"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-background border-r border-border transition-transform duration-300 ease-in-out lg:hidden shadow-lg"
        [class.translate-x-0]="sidebarOpen" [class.-translate-x-full]="!sidebarOpen">
    </app-sidebar>

    <!-- Main Content -->
    <div class="flex flex-col flex-1 lg:pl-64 transition-all duration-300 w-full h-full">
        <app-header [title]="pageTitle" [subtitle]="pageSubtitle" (menuClick)="toggleSidebar()">
        </app-header>

        <main class="flex-1 overflow-y-auto w-full">
            <div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-[1600px]">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
</div>
