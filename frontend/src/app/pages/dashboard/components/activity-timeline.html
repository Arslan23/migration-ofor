<div class="bg-card rounded-xl border border-border p-4 h-full flex flex-col">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h3 class="font-heading font-semibold text-base">Activités récentes</h3>
            <p class="text-xs text-muted-foreground">Dernières mises à jour</p>
        </div>
        <div class="flex items-center gap-2">
            <app-badge *ngIf="filterProjectId !== 'all'" variant="outline" class="text-[10px]">Filtré</app-badge>
            <button class="text-xs font-medium text-primary hover:underline flex items-center gap-1">
                Voir tout <lucide-icon [img]="icons.ArrowRight" class="w-3 h-3"></lucide-icon>
            </button>
        </div>
    </div>

    <div class="space-y-3 max-h-[280px] overflow-y-auto pr-1">
        <div *ngIf="activities().length === 0" class="py-6 text-center text-muted-foreground text-sm">
            Aucune activité trouvée
        </div>

        <div *ngFor="let activity of activities(); let last = last" class="flex items-start gap-2.5 pb-3"
            [class.border-b]="!last" [class.border-border]="!last">

            <!-- Icon -->
            <div class="w-7 h-7 rounded-full flex items-center justify-center shrink-0"
                [ngClass]="getActivityIconClass(activity.type)">
                <lucide-icon *ngIf="activity.type === 'completed'" [img]="icons.CheckCircle2"
                    class="w-3.5 h-3.5"></lucide-icon>
                <lucide-icon *ngIf="activity.type === 'upcoming'" [img]="icons.Clock" class="w-3.5 h-3.5"></lucide-icon>
                <lucide-icon *ngIf="activity.type === 'delayed'" [img]="icons.AlertTriangle"
                    class="w-3.5 h-3.5"></lucide-icon>
            </div>

            <div class="flex-1 min-w-0">
                <p class="font-medium text-foreground text-xs truncate">{{ activity.title }}</p>
                <p class="text-[10px] text-muted-foreground mt-0.5 truncate">{{ activity.project }}</p>
            </div>

            <span class="text-[10px] whitespace-nowrap shrink-0"
                [ngClass]="{'text-destructive': activity.type === 'delayed', 'text-muted-foreground': activity.type !== 'delayed'}">
                {{ activity.date }}
            </span>
        </div>
    </div>
</div>
